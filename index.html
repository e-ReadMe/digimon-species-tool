<!DOCTYPE html>
<html>
<head>
    <title>Species Generator</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, textarea { margin: 5px 0; width: 300px; }
        button { 
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h2>Species Generator</h2>

<label>Species Name (capitalization doesn't matter):</label><br>
<input id="name" placeholder="Botamon"><br>

<label>Base HP:</label><br>
<input id="hp" type="number"><br>

<label>Base Attack:</label><br>
<input id="atk" type="number"><br>

<label>Base Defense:</label><br>
<input id="def" type="number"><br>

<label>Base Sp. Attack:</label><br>
<input id="spa" type="number"><br>

<label>Base Sp. Defense:</label><br>
<input id="spd" type="number"><br>

<label>Base Speed:</label><br>
<input id="spe" type="number"><br>

<label>Description:</label><br>
<textarea id="desc"></textarea><br>

<label>Attribute:</label><br>
<select id="attribute">
  <option value="TYPE_VACCINE">Vaccine</option>
  <option value="TYPE_VIRUS">Virus</option>
  <option value="TYPE_DATA">Data</option>
  <option value="TYPE_FREE">Free</option>
  <option value="TYPE_NODAT">No Data</option>
  <option value="TYPE_UNKNOWN">Unknown</option>
  <option value="TYPE_VARIABLE">Variable</option>
</select>

<label>Type 1:</label><br>
<select id="type1">
  <option value="TYPE_NEUTRAL">Neutral</option>
  <option value="TYPE_COMBAT">Combat</option>
  <option value="TYPE_WIND">Wind</option>
  <option value="TYPE_FILTH">Filth</option>
  <option value="TYPE_EARTH">Earth</option>
  <option value="TYPE_BEAST">Beast</option>
  <option value="TYPE_INSECT">Insect</option>
  <option value="TYPE_UNDEAD">Undead</option>
  <option value="TYPE_METAL">Metal</option>
  <option value="TYPE_FIRE">Fire</option>
  <option value="TYPE_WATER">Water</option>
  <option value="TYPE_PLANT">Plant</option>
  <option value="TYPE_ELECTRIC">Electric</option>
  <option value="TYPE_LIGHT">Light</option>
  <option value="TYPE_ICE">Ice</option>
  <option value="TYPE_DRAGON">Dragon</option>
  <option value="TYPE_DARK">Dark</option>
  <option value="TYPE_PUPPET">Puppet</option>
</select>

<label>Type 2:</label><br>
<select id="type2">
  <option value="TYPE_NEUTRAL">Neutral</option>
  <option value="TYPE_COMBAT">Combat</option>
  <option value="TYPE_WIND">Wind</option>
  <option value="TYPE_FILTH">Filth</option>
  <option value="TYPE_EARTH">Earth</option>
  <option value="TYPE_BEAST">Beast</option>
  <option value="TYPE_INSECT">Insect</option>
  <option value="TYPE_UNDEAD">Undead</option>
  <option value="TYPE_METAL">Metal</option>
  <option value="TYPE_FIRE">Fire</option>
  <option value="TYPE_WATER">Water</option>
  <option value="TYPE_PLANT">Plant</option>
  <option value="TYPE_ELECTRIC">Electric</option>
  <option value="TYPE_LIGHT">Light</option>
  <option value="TYPE_ICE">Ice</option>
  <option value="TYPE_DRAGON">Dragon</option>
  <option value="TYPE_DARK">Dark</option>
  <option value="TYPE_PUPPET">Puppet</option>
</select>


<button onclick="generate()">Generate File</button>

<script>
function generate() {
    const name = document.getElementById("name").value;
    const hp = document.getElementById("hp").value;
    const atk = document.getElementById("atk").value;
    const def = document.getElementById("def").value;
    const spa = document.getElementById("spa").value;
    const spd = document.getElementById("spd").value;
    const spe = document.getElementById("spe").value;
    const desc = document.getElementById("desc").value;
    const attribute = document.getElementById("attribute").value;
    const type1 = document.getElementById("type1").value;
    const type2 = document.getElementById("type2").value;

    const upper = name.toUpperCase();

    const output = `[SPECIES_${upper}] =
    {
        .baseHP        = ${hp},
        .baseAttack    = ${atk},
        .baseDefense   = ${def},
        .baseSpAttack  = ${spa},
        .baseSpDefense = ${spd},
        .baseSpeed     = ${spe},
        .types = MON_TYPES(${attribute}, ${type1}, ${type2}),
        .catchRate = 225,
        .expYield = 100,
        .evYield_HP = 3,
        .evYield_Attack = 3,
        .evYield_Defense = 3,
        .evYield_SpAttack = 3,
        .evYield_SpDefense = 3,
        .evYield_Speed = 3,
        .itemCommon = ITEM_ORAN_BERRY,
        .itemRare = ITEM_ORAN_BERRY,
        .genderRatio = MON_GENDERLESS,
        .eggCycles = 20,
        .friendship = STANDARD_FRIENDSHIP,
        .growthRate = GROWTH_MEDIUM_FAST,
        .eggGroups = MON_EGG_GROUPS(EGG_GROUP_NO_EGGS_DISCOVERED),
        .abilities = { ABILITY_TACTICAL_RETREAT, ABILITY_TACTICAL_RETREAT, ABILITY_NONE },
        .bodyColor = BODY_COLOR_BLACK,
        .speciesName = _("${name}"),
        .description = COMPOUND_STRING(
            "${desc.replace(/\n/g, '\\n\"\\n\"')}"
        ),
        .levelUpLearnset = s${name}LevelUpLearnset,
        .formSpeciesIdTable = s${name}FormSpeciesIdTable,
        .digivolutions = s${name}DigivolveTable,
        .eggId = EGG_ID_${upper},
    },`;

    downloadFile(`${name}.txt`, output);
}

function downloadFile(filename, content) {
    const blob = new Blob([content], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}
</script>

</body>
</html>
