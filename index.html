<!DOCTYPE html>
<html>
<head>
    <title>Species Generator</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, textarea { margin: 5px 0; width: 300px; }
        button { 
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h2>Species Generator</h2>

<label>Species Name (capitalization doesn't matter):</label><br>
<input id="name" placeholder="Botamon"><br>

<label>Base Stats ------------------------</label><br>
    
<label>Base HP:</label><br>
<input id="hp" type="number"><br>

<label>Base Attack:</label><br>
<input id="atk" type="number"><br>

<label>Base Defense:</label><br>
<input id="def" type="number"><br>

<label>Base Sp. Attack:</label><br>
<input id="spa" type="number"><br>

<label>Base Sp. Defense:</label><br>
<input id="spd" type="number"><br>

<label>Base Speed:</label><br>
<input id="spe" type="number"><br>

<label>Description:</label><br>
<textarea id="desc"></textarea><br>

<br>
<!-- <p>types ----------------------------------------------------------------------------------------</p> -->
<label>Types and Attributes ------------------------</label><br>
<label>Attribute:</label>
<select id="attribute">
  <option value="TYPE_VACCINE">Vaccine</option>
  <option value="TYPE_VIRUS">Virus</option>
  <option value="TYPE_DATA">Data</option>
  <option value="TYPE_FREE">Free</option>
  <option value="TYPE_NODAT">No Data</option>
  <option value="TYPE_UNKNOWN">Unknown</option>
  <option value="TYPE_VARIABLE">Variable</option>
</select>
<br>   
<br>
<label>Type 1:</label>
<select id="type1">
  <option value="TYPE_NEUTRAL">Neutral</option>
  <option value="TYPE_COMBAT">Combat</option>
  <option value="TYPE_WIND">Wind</option>
  <option value="TYPE_FILTH">Filth</option>
  <option value="TYPE_EARTH">Earth</option>
  <option value="TYPE_BEAST">Beast</option>
  <option value="TYPE_INSECT">Insect</option>
  <option value="TYPE_UNDEAD">Undead</option>
  <option value="TYPE_METAL">Metal</option>
  <option value="TYPE_FIRE">Fire</option>
  <option value="TYPE_WATER">Water</option>
  <option value="TYPE_PLANT">Plant</option>
  <option value="TYPE_ELECTRIC">Electric</option>
  <option value="TYPE_LIGHT">Light</option>
  <option value="TYPE_ICE">Ice</option>
  <option value="TYPE_DRAGON">Dragon</option>
  <option value="TYPE_DARK">Dark</option>
  <option value="TYPE_PUPPET">Puppet</option>
</select>
<br>   
<br>
<label>Type 2:</label>
<select id="type2">
  <option value="TYPE_NEUTRAL">Neutral</option>
  <option value="TYPE_COMBAT">Combat</option>
  <option value="TYPE_WIND">Wind</option>
  <option value="TYPE_FILTH">Filth</option>
  <option value="TYPE_EARTH">Earth</option>
  <option value="TYPE_BEAST">Beast</option>
  <option value="TYPE_INSECT">Insect</option>
  <option value="TYPE_UNDEAD">Undead</option>
  <option value="TYPE_METAL">Metal</option>
  <option value="TYPE_FIRE">Fire</option>
  <option value="TYPE_WATER">Water</option>
  <option value="TYPE_PLANT">Plant</option>
  <option value="TYPE_ELECTRIC">Electric</option>
  <option value="TYPE_LIGHT">Light</option>
  <option value="TYPE_ICE">Ice</option>
  <option value="TYPE_DRAGON">Dragon</option>
  <option value="TYPE_DARK">Dark</option>
  <option value="TYPE_PUPPET">Puppet</option>
</select>
<br>   
<br>
<!-- <p>Extra Info ----------------------------------------------------------------------------------------</p> -->
<label>Extra Info ------------------------</label><br>
<label>Catch Rate. 225 is caterpie. 45 are starters. 3 is Mewtwo. </label><br>
<input id="catchrate" type="number" placeholder="225"><br><br>

<label>Exp yield. Sunkern rewards 36, Pikachu rewards 100, Butterfree rewards 200, Dragonite rewards 300, Blissey Rewards 635 </label><br>
<input id="expyield" type="number" placeholder="100"><br><br>

<!-- <p>EV Yields ----------------------------------------------------------------------------------------</p> -->
<label>EV Yields ------------------------</label><br>
<label>EV Yields after Battle. Each must be either 0, 1, 2 or 3. You can have 3 for each if you want. </label><br>
    
<label>HP EV Yield.</label><br>
<input id="evyield_hp" type="number"><br>

<label>Attack EV Yield.</label><br>
<input id="evyield_attack" type="number"><br>

<label>Defense EV Yield.</label><br>
<input id="evyield_defense" type="number"><br>

<label>Sp Attack EV Yield.</label><br>
<input id="evyield_spattack" type="number"><br>

<label>Sp Defense EV Yield.</label><br>
<input id="evyield_spdefense" type="number"><br>

<label>Speed EV Yield.</label><br>
<input id="evyield_speed" type="number"><br>

<!-- <p>hold items ----------------------------------------------------------------------------------------</p> -->

<label>Common Held Item. 50% chance.</label><br>
<textarea id="item1" placeholder="ITEM_ORAN_BERRY"></textarea><br>

<label>Rare Held Item. 1% chance. Make it the same as the Common Held Item and It'll have a 100% chance. </label><br>
<textarea id="item2" placeholder="ITEM_ORAN_BERRY"></textarea><br>
    

    
<button onclick="generate()">Generate File</button>

<script>
function generate() {
    const name = document.getElementById("name").value;
    const hp = document.getElementById("hp").value;
    const atk = document.getElementById("atk").value;
    const def = document.getElementById("def").value;
    const spa = document.getElementById("spa").value;
    const spd = document.getElementById("spd").value;
    const spe = document.getElementById("spe").value;
    const desc = document.getElementById("desc").value;
    const attribute = document.getElementById("attribute").value;
    const type1 = document.getElementById("type1").value;
    const type2 = document.getElementById("type2").value;
    const catchrate = document.getElementById("catchrate").value;
    const expyield = document.getElementById("expyield").value;
    const evyield_hp = document.getElementById("evyield_hp").value;
    const evyield_attack = document.getElementById("evyield_attack").value;
    const evyield_defense = document.getElementById("evyield_defense").value;
    const evyield_spattack = document.getElementById("evyield_spattack").value;
    const evyield_spdefense = document.getElementById("evyield_spdefense").value;
    const evyield_speed = document.getElementById("evyield_speed").value;
    const item1 = document.getElementById("item1").value;
    const item2 = document.getElementById("item2").value;

    const upper = name.toUpperCase();

    const output = `[SPECIES_${upper}] =
    {
        .baseHP        = ${hp},
        .baseAttack    = ${atk},
        .baseDefense   = ${def},
        .baseSpAttack  = ${spa},
        .baseSpDefense = ${spd},
        .baseSpeed     = ${spe},
        .types = MON_TYPES(${attribute}, ${type1}, ${type2}),
        .catchRate = ${catchrate},
        .expYield = ${expyield},
        .evYield_HP = ${evyield_hp},
        .evYield_Attack = ${evyield_attack},
        .evYield_Defense = ${evyield_defense},
        .evYield_SpAttack = ${evyield_spattack},
        .evYield_SpDefense = ${spdefense},
        .evYield_Speed = ${evyield_speed},
        .itemCommon = ${item1},
        .itemRare = ${item2},
        .genderRatio = MON_GENDERLESS,
        .eggCycles = 20,
        .friendship = STANDARD_FRIENDSHIP,
        .growthRate = GROWTH_MEDIUM_FAST,
        .eggGroups = MON_EGG_GROUPS(EGG_GROUP_NO_EGGS_DISCOVERED),
        .abilities = { ABILITY_TACTICAL_RETREAT, ABILITY_TACTICAL_RETREAT, ABILITY_NONE },
        .bodyColor = BODY_COLOR_BLACK,
        .speciesName = _("${name}"),
        .description = COMPOUND_STRING(
            "${desc.replace(/\n/g, '\\n\"\\n\"')}"
        ),
        .levelUpLearnset = s${name}LevelUpLearnset,
        .formSpeciesIdTable = s${name}FormSpeciesIdTable,
        .digivolutions = s${name}DigivolveTable,
        .eggId = EGG_ID_${upper},
    },`;

    downloadFile(`${name}.txt`, output);
}

function downloadFile(filename, content) {
    const blob = new Blob([content], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}
</script>

</body>
</html>
